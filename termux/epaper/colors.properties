# 基本の背景と文字（完全な白と完全な黒）
background = #ffffff
foreground = #000000

# カーソル（見失わないよう黒、または反転）
cursor = #000000

# カラーパレットの最適化（16色すべてを黒・暗いグレー・白に統一）
# これにより、プログラムが色付きの出力をしても潰れずに読めるようになります

# Black / Dark Grey (通常文字や暗い要素)
color0 = #000000
color8 = #555555

# Red / Green / Yellow / Blue / Magenta / Cyan
# 通常は色がつきますが、すべて「黒」か「濃いグレー」に固定します
color1 = #000000
color9 = #000000
color2 = #000000
color10 = #555555
color3 = #333333
color11 = #555555
color4 = #000000
color12 = #000000
color5 = #333333
color13 = #555555
color6 = #000000
color14 = #555555

# White / Light Grey (背景に近い色は、E-inkでは見えなくなるため白〜薄いグレーに)
color7 = #aaaaaa
color15 = #ffffff
