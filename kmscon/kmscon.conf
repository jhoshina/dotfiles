# /etc/kmscon/kmscon.conf

# カスタムパレットの有効化
palette=custom

# --------------------------------------------------
# Gruvbox Dark (Medium) パレット設定
# --------------------------------------------------
# 背景色と文字色 (Dark 2 と Light 1)
palette-background=40,40,40
palette-foreground=235,219,178

# 標準16色 (ANSI 0 ~ 7)
palette-black=40,40,40          # bg0
palette-red=204,36,29           # red
palette-green=152,151,26        # green
palette-yellow=215,153,33       # yellow
palette-blue=69,133,136         # blue
palette-magenta=177,98,134      # purple
palette-cyan=104,157,106        # aqua
palette-white=168,153,132       # gray

# 明るい色 (ANSI 8 ~ 15)
palette-bright-black=146,131,116 # gray
palette-bright-red=251,73,52     # red (bright)
palette-bright-green=184,187,38  # green (bright)
palette-bright-yellow=250,189,47 # yellow (bright)
palette-bright-blue=131,165,152  # blue (bright)
palette-bright-magenta=211,134,155 # purple (bright)
palette-bright-cyan=142,192,124  # aqua (bright)
palette-bright-white=235,219,178 # fg1
